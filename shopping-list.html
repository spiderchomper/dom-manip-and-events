<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shopping list example</title>
    <style>
      li {
        margin-bottom: 10px;
      }

      li button {
        font-size: 12px;
        margin-left: 20px;
        color: #666;
      }
    </style>
  </head>
  <body>
    <h1>My shopping list</h1>

    <form>
      <label for="item">Enter a new item:</label>
      <input type="text" name="item" id="item" />
      <button>Add item</button>
    </form>

    <ul></ul>

    <script>
      const shoppingList = document.querySelector("ul");
      let inputText = document.querySelector("input");
      const btn = document.querySelector("button");

      btn.addEventListener("click", btnClick);

      function btnClick(event) {
        event.preventDefault(); // prevents refresh on click
        const toAdd = inputText.value;
        inputText.value = ""; // clear input field

        const listItem = document.createElement("li");
        const itemText = document.createElement("span");
        const delBtn = document.createElement("button");

        listItem.appendChild(itemText);
        listItem.appendChild(delBtn);

        itemText.textContent = toAdd;
        delBtn.textContent = "Delete";

        shoppingList.appendChild(listItem); // add item to list

        delBtn.addEventListener("click", () => {
          // remove item from list
          shoppingList.removeChild(listItem);
          // listItem.remove(); works but not on old browsers
        });

        inputText.focus();
      }
    </script>
  </body>
</html>
